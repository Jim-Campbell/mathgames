<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1c">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b0e1a'/%3E%3Ccircle cx='50' cy='38' r='30' fill='%23f4f2ea'/%3E%3Ccircle cx='50' cy='62' r='30' fill='%23ee1515'/%3E%3Crect x='20' y='47' width='60' height='6' fill='%230b0e1a'/%3E%3Ccircle cx='50' cy='50' r='11' fill='%230b0e1a'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%23f4f2ea'/%3E%3C/svg%3E">
<title>Poké Math Training</title>
<style>
:root {
  --bg: #0a0e1c; --card: #141b30; --card2: #1b2440; --text: #f4f2ea; --muted: #8891b3;
  --line: #2a3357; --orange: #ff8c1a; --orange-deep: #ff6a00; --gold: #ffd54a; --red: #ff5252;
  --green: #35d488; --blue: #4fc3f7; --purple: #b388ff; --common: #8891b3; --rare: #4fc3f7;
  --epic: #b388ff; --legendary: #ffd54a; --shadow: 0 6px 24px rgba(0,0,0,.55);
}
* { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: radial-gradient(ellipse at 50% -10%, #1b2a52 0%, #0a0e1c 55%) fixed;
  color: var(--text); overscroll-behavior-y: contain;
}
button, input, select { font-family: inherit; }
header {
  position: sticky; top: 0; z-index: 8; display: flex; justify-content: space-between; align-items: center;
  padding: calc(10px + env(safe-area-inset-top)) 16px 10px; background: rgba(10,14,28,.85); backdrop-filter: blur(6px);
  border-bottom: 1px solid var(--line);
}
header h1 { font-size: 1.05rem; font-weight: 800; letter-spacing: .02em; cursor: pointer; color: var(--gold); }
header h1 span { color: var(--orange); }
#muteBtn { background: none; border: none; font-size: 1.3rem; cursor: pointer; padding: 6px; min-width: 44px; min-height: 44px; }
main { max-width: 760px; margin: 0 auto; padding: 16px 16px 96px; min-height: 100%; }
#tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 8; display: flex; background: rgba(10,14,28,.92);
  backdrop-filter: blur(6px); border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom);
}
#tabbar button {
  flex: 1; background: none; border: none; color: var(--muted); padding: 10px 4px 8px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px; min-height: 76px; font-size: .8rem; font-weight: 600;
}
#tabbar button.on { color: var(--orange); }
.tab-icon { font-size: 2.5rem; line-height: 1; }
h2 { font-size: 1.15rem; margin-bottom: 10px; color: var(--text); }
h3 { font-size: .82rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin: 20px 0 8px; }
.card { background: var(--card); border-radius: 14px; box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px; border: 1px solid var(--line); }
.empty { text-align: center; color: var(--muted); padding: 40px 12px; }
.muted { color: var(--muted); }
button.btn {
  border: none; border-radius: 12px; padding: 12px 16px; font-size: .9rem; font-weight: 700; cursor: pointer;
  background: var(--card2); color: var(--text); min-height: 44px;
}
button.btn.primary { background: linear-gradient(135deg, var(--orange), var(--orange-deep)); color: #1a0e00; }
button.btn.ghost { background: none; color: var(--muted); }
button.btn.sm { padding: 8px 12px; font-size: .78rem; min-height: 36px; }
button.btn.danger { background: rgba(255,82,82,.14); color: var(--red); border: 1px solid var(--red); }
button.btn:disabled { opacity: .4; cursor: default; }
label.f { display: block; font-size: .75rem; color: var(--muted); margin: 12px 0 4px; }
input[type=text], input[type=number], textarea {
  width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--bg);
  color: var(--text); font-size: 16px;
}
.scrollx { overflow-x: auto; -webkit-overflow-scrolling: touch; }
dialog {
  border: none; border-radius: 16px; background: var(--card); color: var(--text);
  width: min(480px, calc(100vw - 24px)); max-height: 86vh; overflow-y: auto; padding: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,.6); margin: auto; border: 1px solid var(--line);
}
dialog::backdrop { background: rgba(0,0,0,.6); }
.dlg-actions { display: flex; gap: 8px; margin-top: 18px; }
.dlg-actions .btn { flex: 1; }
#toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--card2);
  color: var(--text); padding: 10px 18px; border-radius: 20px; font-size: .85rem; opacity: 0;
  transition: opacity .25s; pointer-events: none; z-index: 40; max-width: 90vw; border: 1px solid var(--line);
}
#toast.show { opacity: 1; }
#offlineBar {
  position: sticky; top: 0; z-index: 9; max-height: 0; overflow: hidden; text-align: center;
  background: var(--red); color: #2a0a0a; font-size: .8rem; font-weight: 700; padding: 0 12px;
  transition: max-height .25s ease, padding .25s ease;
}
#offlineBar.show { max-height: 40px; padding: 8px 12px; }
.ai-off-notice {
  background: var(--card2); border: 1px solid var(--line); border-left: 3px solid var(--gold);
  border-radius: 10px; padding: 10px 14px; font-size: .82rem; color: var(--muted); margin-bottom: 12px;
}

/* ---- home ---- */
.hero-banner { text-align: center; padding: 14px 16px 0; }
.hero-kicker {
  font-size: .74rem; font-weight: 900; letter-spacing: .16em; color: var(--orange);
  text-shadow: 0 0 12px rgba(255,140,26,.5);
}
.hero-taunt { margin-top: 6px; font-size: .88rem; font-style: italic; color: var(--muted); }
.power-block { position: relative; text-align: center; padding: 34px 0 20px; }
.power-aura {
  position: absolute; left: 50%; top: 44%; transform: translate(-50%, -50%); width: 220px; height: 220px;
  border-radius: 50%; background: radial-gradient(circle, rgba(255,140,26,.35), transparent 70%); filter: blur(4px);
  animation: aura-pulse 2.4s ease-in-out infinite;
}
@keyframes aura-pulse { 0%,100% { transform: translate(-50%,-50%) scale(.92); opacity: .7; } 50% { transform: translate(-50%,-50%) scale(1.08); opacity: 1; } }
.power-num { position: relative; font-size: 3.2rem; font-weight: 900; font-variant-numeric: tabular-nums; color: var(--gold); text-shadow: 0 0 24px rgba(255,213,74,.6); }
.power-label { position: relative; font-size: .8rem; letter-spacing: .18em; color: var(--muted); margin-top: 2px; }
.dc-sub { color: var(--muted); font-size: .85rem; margin-top: 4px; }
.train-btn {
  display: block; width: 100%; padding: 18px; border: none; border-radius: 16px; font-size: 1.2rem; font-weight: 900;
  color: #1a0e00; background: linear-gradient(135deg, var(--gold), var(--orange-deep)); cursor: pointer; margin-bottom: 6px;
  box-shadow: 0 4px 20px rgba(255,140,26,.4); min-height: 64px;
}
.skill-chips { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.skill-chip {
  display: flex; align-items: baseline; justify-content: space-between; gap: 6px;
  background: var(--card); border: 1px solid var(--line); border-radius: 9px; padding: 7px 10px; text-align: left;
  cursor: pointer; color: var(--text); min-height: 40px;
}
.sc-name { font-weight: 700; font-size: .8rem; }
.sc-level { color: var(--orange); font-size: .72rem; font-weight: 700; flex-shrink: 0; }
.unlock-strip { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; }
.unlock-mini { text-align: center; flex-shrink: 0; width: 68px; }
.um-name { font-size: .68rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.activity-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
.activity-bar { display: flex; gap: 3px; align-items: flex-end; min-width: min-content; }
.act-col { flex: 0 0 20px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.act-bars { height: 60px; width: 100%; display: flex; flex-direction: column; justify-content: flex-end; border-radius: 3px; overflow: hidden; background: var(--card); }
.act-wrong { width: 100%; background: var(--red); }
.act-correct { width: 100%; background: var(--green); }
.act-empty { height: 3px; width: 100%; background: var(--line); margin-top: auto; }
.act-day { font-size: .55rem; color: var(--muted); white-space: nowrap; transform: rotate(-45deg); transform-origin: center; height: 22px; }

/* ---- message Uncle Jim ---- */
.msg-btn {
  display: block; width: 100%; margin-top: 18px; padding: 14px; border: 1px solid var(--line);
  border-radius: 14px; background: var(--card); color: var(--text); font-size: 1rem; font-weight: 800;
  cursor: pointer; min-height: 56px;
}
.msg-kinds { display: flex; gap: 8px; margin: 12px 0; }
.msg-kind {
  flex: 1; border: 2px solid var(--line); border-radius: 12px; background: var(--card2); color: var(--text);
  font-size: .85rem; font-weight: 700; padding: 10px 6px; cursor: pointer; min-height: 48px;
}
.msg-kind.sel { border-color: var(--orange); background: rgba(255,140,26,.18); }
.msg-text { min-height: 140px; resize: vertical; font-family: inherit; line-height: 1.4; }
.msg-row { border-bottom: 1px solid var(--line); padding: 12px 0; }
.msg-row.unread { background: rgba(255,213,74,.06); border-left: 3px solid var(--gold); padding-left: 10px; }
.msg-body { font-size: .92rem; line-height: 1.45; white-space: pre-wrap; margin: 4px 0 6px; }
.msg-meta { font-size: .74rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 6px 12px; align-items: center; }
.msg-mail-err { color: var(--red); }
.msg-row .btn { margin-top: 8px; }

/* ---- screen time gauge ---- */
.gauge-wrap { text-align: center; margin: 4px 0 18px; }
.gauge-title {
  font-size: .74rem; font-weight: 900; letter-spacing: .16em; color: var(--orange);
  text-shadow: 0 0 12px rgba(255,140,26,.5); margin-bottom: 4px;
}
.gauge-wrap.full .gauge-title { color: var(--gold); text-shadow: 0 0 12px rgba(255,213,74,.6); }
.gauge-svg { width: 220px; max-width: 66vw; height: auto; }
.gauge-track { stroke: var(--card2); }
.gauge-fill { stroke: var(--orange); }
.gauge-wrap.full .gauge-fill { stroke: var(--gold); }
.gauge-tick { stroke: var(--muted); stroke-width: 2; }
.gauge-needle { stroke: var(--text); stroke-width: 3; stroke-linecap: round; }
.gauge-minutes { font-size: 1.7rem; font-weight: 900; fill: var(--gold); font-variant-numeric: tabular-nums; }
.gauge-label { font-size: .68rem; color: var(--muted); letter-spacing: .1em; font-weight: 800; text-transform: uppercase; margin-top: -4px; padding: 0 12px; }
.gauge-wrap.full .gauge-label { color: var(--gold); }
@keyframes gauge-glow { 0%,100% { filter: drop-shadow(0 0 6px rgba(255,213,74,.5)); } 50% { filter: drop-shadow(0 0 18px rgba(255,213,74,.9)); } }
.gauge-wrap.full .gauge-svg { animation: gauge-glow 1.8s ease-in-out infinite; }

/* ---- play ---- */
.play-wrap { max-width: 560px; margin: 0 auto; }
.play-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.end-btn { background: var(--card2); border: none; color: var(--muted); width: 44px; height: 44px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; }
.streak { font-weight: 800; font-size: 1rem; padding: 6px 12px; border-radius: 20px; background: var(--card2); }
.streak.flame-3 { color: var(--gold); box-shadow: 0 0 12px rgba(255,213,74,.4); }
.streak.flame-6 { color: var(--orange); box-shadow: 0 0 18px rgba(255,140,26,.6); animation: flame-flicker 1s infinite; }
.streak.flame-11 { color: var(--red); box-shadow: 0 0 26px rgba(255,82,82,.7); animation: flame-flicker .6s infinite; }
@keyframes flame-flicker { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
.xp-earned { font-weight: 800; color: var(--gold); }
.qcard { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 24px 18px; text-align: center; margin-bottom: 16px; transition: box-shadow .2s; }
.prompt { font-size: 1.6rem; font-weight: 800; line-height: 1.3; }
.fraction-bar { width: 100%; max-width: 320px; margin: 0 auto 16px; display: block; }
.seq-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
.seq-box { min-width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; background: var(--card2); border-radius: 10px; font-weight: 800; font-size: 1.1rem; }
.seq-box.blank { background: var(--orange-deep); color: #fff; }
.logic-grid { border-collapse: collapse; margin: 0 auto 14px; }
.logic-grid td { border: 1px solid var(--line); padding: 8px 12px; font-size: .85rem; }
.grid-raw { text-align: left; white-space: pre-wrap; font-size: .75rem; color: var(--muted); background: var(--bg); padding: 8px; border-radius: 8px; }
.answer-display { text-align: center; font-size: 2.2rem; font-weight: 900; min-height: 56px; color: var(--gold); font-variant-numeric: tabular-nums; margin-bottom: 10px; }
.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.key {
  background: var(--card2); border: 1px solid var(--line); border-radius: 12px; color: var(--text);
  font-size: 1.4rem; font-weight: 700; min-height: 64px; cursor: pointer;
}
.key.key-back { color: var(--red); }
.key.key-ok { background: linear-gradient(135deg, var(--green), #1fae6b); color: #04241a; }
.two-field, .frac-field { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; justify-content: center; }
.two-field .field, .frac-field .field {
  flex: 1; max-width: 140px; background: var(--card2); border: 2px solid var(--line); border-radius: 12px;
  padding: 10px; text-align: center; cursor: pointer; min-height: 64px;
}
.two-field .field.active, .frac-field .field.active { border-color: var(--orange); }
.flabel { font-size: .68rem; color: var(--muted); text-transform: uppercase; }
.fval { font-size: 1.6rem; font-weight: 800; font-variant-numeric: tabular-nums; }
.frac-field .field { font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }
.frac-bar-divider { width: 36px; height: 4px; background: var(--text); border-radius: 2px; }
.mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mc-btn { min-height: 64px; border-radius: 12px; border: 2px solid var(--line); background: var(--card2); color: var(--text); font-size: 1.1rem; font-weight: 700; cursor: pointer; padding: 10px; }
.mc-btn.sel { border-color: var(--orange); background: rgba(255,140,26,.18); }
.text-input-wrap { display: flex; gap: 10px; }
.text-input-wrap input { flex: 1; }
.feedback { border-radius: 14px; padding: 16px; margin-top: 14px; text-align: center; }
.feedback.correct { background: rgba(53,212,136,.14); border: 1px solid var(--green); }
.feedback.wrong { background: rgba(255,82,82,.1); border: 1px solid var(--red); }
.fb-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 6px; }
.feedback.correct .fb-title { color: var(--green); }
.feedback.wrong .fb-title { color: var(--red); }
.xp-fly { font-weight: 800; color: var(--gold); font-size: 1.3rem; animation: xp-float .9s ease-out; }
@keyframes xp-float { 0% { transform: translateY(6px); opacity: 0; } 30% { opacity: 1; } 100% { transform: translateY(-8px); opacity: 1; } }
.stt-chip { display: inline-block; margin-top: 8px; font-weight: 800; color: var(--blue); font-size: .85rem; background: rgba(79,195,247,.14); border-radius: 12px; padding: 4px 10px; }
.fb-speed { margin-top: 8px; font-weight: 800; font-size: .9rem; letter-spacing: .04em; }
.fb-speed.blazing { color: var(--gold); text-shadow: 0 0 12px rgba(255,213,74,.6); }
.fb-speed.fast { color: var(--orange); }

/* ---- ki-charge speed timer ---- */
.ki-wrap { margin: 0 2px 16px; }
.ki-track { height: 14px; border-radius: 8px; background: var(--card2); border: 1px solid var(--line); overflow: hidden; }
.ki-fill { height: 100%; border-radius: 8px 0 0 8px; transition: background-color .25s; }
.ki-fill.blazing { background: linear-gradient(90deg, var(--gold), var(--orange)); box-shadow: 0 0 14px rgba(255,213,74,.7); }
.ki-fill.fast { background: linear-gradient(90deg, var(--orange), var(--orange-deep)); }
.ki-fill.base { background: var(--muted); }
.ki-taunt { text-align: center; font-size: .78rem; font-weight: 800; letter-spacing: .03em; margin-top: 6px; }
.ki-taunt.blazing { color: var(--gold); }
.ki-taunt.fast { color: var(--orange); }
.ki-taunt.base { color: var(--muted); }
.fb-answer { font-weight: 700; margin: 8px 0 4px; }
.fb-explain { color: var(--muted); font-size: .92rem; line-height: 1.4; margin-bottom: 12px; }
.qcard.correct { box-shadow: 0 0 0 3px var(--green); }
.qcard.wrong { animation: shake .4s; box-shadow: 0 0 0 3px var(--red); }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
.end-wrap { text-align: center; padding: 40px 12px; }
.end-stat { font-size: 1.1rem; font-weight: 700; margin: 8px 0; }
.end-wrap .btn { margin: 6px auto; display: block; max-width: 260px; }

/* ---- overlay ---- */
#overlayRoot { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; background: rgba(4,6,14,.88); padding: 20px; }
#overlayRoot.show { display: flex; }
.ov-card { text-align: center; position: relative; }
.ov-card h2 { font-size: 1.8rem; font-weight: 900; color: var(--gold); margin-bottom: 12px; text-shadow: 0 0 20px rgba(255,213,74,.6); }
.ov-card.legendary-moment h2 { color: var(--red); font-size: 2.4rem; text-shadow: 0 0 30px rgba(255,82,82,.8); }
.ov-flash { position: absolute; inset: -60px; border-radius: 50%; background: radial-gradient(circle, rgba(255,213,74,.5), transparent 65%); animation: flash-pop .6s ease-out; z-index: -1; }
.ov-flash.big { background: radial-gradient(circle, rgba(255,82,82,.6), transparent 65%); }
@keyframes flash-pop { 0% { transform: scale(.3); opacity: 0; } 40% { opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
.ov-name { font-weight: 800; font-size: 1.2rem; margin: 10px 0 4px; }
.ov-rarity { display: inline-block; padding: 2px 12px; border-radius: 10px; font-size: .75rem; font-weight: 700; text-transform: uppercase; }
.ov-rarity.common { background: var(--common); color: #1a1a1a; } .ov-rarity.rare { background: var(--rare); color: #04203a; }
.ov-rarity.epic { background: var(--epic); color: #22093f; } .ov-rarity.legendary { background: var(--legendary); color: #3a2600; }
.ov-sub { color: var(--muted); margin-bottom: 14px; }
.badge-icon { font-size: 3rem; margin: 10px 0; }
.ov-card .btn { margin-top: 16px; min-width: 180px; }
.ov-event { cursor: pointer; }
.ov-event-flash { background: radial-gradient(circle, rgba(255,82,82,.65), transparent 65%); animation: luckyegg-pulse 1s ease-in-out infinite; }
@keyframes luckyegg-pulse { 0%,100% { transform: scale(1); opacity: .75; } 50% { transform: scale(1.18); opacity: 1; } }
.ov-event-name { color: var(--red); font-size: 2.1rem; text-shadow: 0 0 24px rgba(255,82,82,.85); animation: luckyegg-shake .35s ease-in-out infinite; }
@keyframes luckyegg-shake { 0%,100% { transform: translate(0,0); } 25% { transform: translate(-3px,1px); } 50% { transform: translate(3px,-1px); } 75% { transform: translate(-2px,-2px); } }
.ov-event .ov-sub { color: var(--text); font-weight: 700; }
.ov-event-xp { font-weight: 900; font-size: 1.3rem; color: var(--gold); margin-top: 8px; }

/* Critical Hit: cool, calm, silver-white — a floaty pulse, no shake. */
.ov-event-critical_hit .ov-event-flash { background: radial-gradient(circle, rgba(230,240,255,.7), transparent 65%); animation: crit-pulse 2.2s ease-in-out infinite; }
@keyframes crit-pulse { 0%,100% { transform: scale(1); opacity: .6; } 50% { transform: scale(1.1); opacity: .95; } }
.ov-event-critical_hit .ov-event-name { color: #eef4ff; text-shadow: 0 0 26px rgba(200,220,255,.9); animation: none; }

/* Rare Candy: Poké-tech teal/yellow, a candy pop instead of a flash. */
.ov-event-rare_candy .ov-event-flash { background: radial-gradient(circle, rgba(78,205,196,.55), transparent 65%); animation: luckyegg-pulse 1.4s ease-in-out infinite; }
.ov-event-rare_candy .ov-event-name { color: #ffd54a; text-shadow: 0 0 22px rgba(78,205,196,.8); animation: none; }
.ov-candy-icon { width: 64px; height: 64px; margin: 6px auto; animation: candy-pop .6s ease-out; }
@keyframes candy-pop { 0% { transform: scale(.2); opacity: 0; } 60% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
.ov-event-rare_candy .ov-event-xp { color: #ffd54a; }

/* Slowpoke's Patience: mystic purple, solemn slow pulse, no shake. */
.ov-event-slowpoke .ov-event-flash { background: radial-gradient(circle, rgba(138,79,255,.6), transparent 65%); animation: slowpoke-pulse 2.6s ease-in-out infinite; }
@keyframes slowpoke-pulse { 0%,100% { transform: scale(1); opacity: .55; } 50% { transform: scale(1.08); opacity: .9; } }
.ov-event-slowpoke .ov-event-name { color: #c9a8ff; text-shadow: 0 0 26px rgba(138,79,255,.85); animation: none; }
.ov-tap-hint { color: var(--muted); font-size: .78rem; margin-top: 16px; text-transform: uppercase; letter-spacing: .06em; }

/* ---- video clip overlay ---- */
.clip-card { max-width: 480px; width: 100%; }
.clip-play-btn {

<body>
<header>

  <button id="muteBtn" onclick="toggleMute()">🔊</button>
</header>
<div id="offlineBar">📡 Offline — training will resume when you're back online</div>
<main id="main"></main>
<nav id="tabbar"></nav>
<div id="toast"></div>
<dialog id="dlg"></dialog>
<div id="overlayRoot"></div>

<script>
'use strict';

// ---------- registries (mirror internal/game/skills.go) ----------
const SKILLS = [
  { slug: 'multiplication', name: 'Multiplication' },
  { slug: 'division', name: 'Division' },
  { slug: 'addsub', name: 'Addition & Subtraction' },
  { slug: 'fractions', name: 'Fractions' },
  { slug: 'place_value', name: 'Place Value' },
  { slug: 'patterns', name: 'Patterns' },
  { slug: 'word_problems', name: 'Word Problems' },
  { slug: 'logic', name: 'Logic Puzzles' },
];
const SKILL_NAME = Object.fromEntries(SKILLS.map(s => [s.slug, s.name]));
const APP_VERSION = 'v1.0';
const SAGA_NAMES = { pewter: 'Pewter Gym', cerulean: 'Cerulean Gym', celadon: 'Celadon Gym', fuchsia: 'Fuchsia Gym', cinnabar: 'Cinnabar Gym' };
const RARITY_COLOR = { common: '#8891b3', rare: '#4fc3f7', epic: '#b388ff', legendary: '#ffd54a' };
const TAUNTS = [
  "Every legend starts as a nobody. Prove them wrong.",
  "A true trainer never gives up. Neither do you.",
  "Somewhere, a Pokémon is cheering you on. Go get stronger.",
  "Think you've hit your limit? Champions don't have one.",
  "Even Charizard started as a tiny Charmander. This is yours.",
  "Numbers don't lie. Neither does hard work. Let's go.",
  "Scared of a word problem? A word problem should be scared of you.",
  "A comeback only kicks in after you get knocked down. Bring it on.",
  "Today's training: get stronger than yesterday's you.",
  "Zzz... is that all you've got? Show me a real Trainer XP.",
];

// ---------- state ----------
const S = {
  view: 'home',
  profile: null, collection: null, quests: null, settingsData: null, parents: null, questions: [],
  session: null, current: null, currentStart: 0, feedback: null, locked: false,
  overlayQueue: [], currentOverlay: null,
  numpad: '', numpadVals: ['', ''], numpadField: 0, mcSelected: -1, textVal: '',
  muted: localStorage.getItem('mg_mute') === '1',
  showTimer: localStorage.getItem('mg_timer') !== '0',
  seenLegendaryMoment: localStorage.getItem('mg_seen_legendary') === '1',
  offline: false, aiEnabled: true,
  taunt: TAUNTS[Math.floor(Math.random() * TAUNTS.length)],
  screenTime: null, screenTimeFullSeen: false, screenTimeLog: null,
  clips: null, clipPlays: null, videoEnabled: false,
  messages: null, messagingEnabled: true,
};

// ---------- api ----------
function apiKey() { return localStorage.getItem('mg_api_key') || ''; }
function setOffline(v) {
  if (S.offline === v) return;
  S.offline = v;
  $('#offlineBar').classList.toggle('show', v);
}
window.addEventListener('online', () => setOffline(false));
window.addEventListener('offline', () => setOffline(true));
async function api(path, opts = {}) {
  opts.headers = Object.assign({ Authorization: 'Bearer ' + apiKey() }, opts.headers || {});
  if (opts.body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(opts.body); }
  let res;
  try { res = await fetch('/api' + path, opts); }
  catch (e) { setOffline(true); throw new Error('offline'); }
  setOffline(false);
  if (res.status === 401) { askKey(); throw new Error('unauthorized'); }
  if (!res.ok) {
    let msg = 'request failed';
    try { msg = (await res.json()).error || msg; } catch (e) {}
    const err = new Error(msg);
    err.status = res.status; // callers that care (e.g. 429 on messages) can branch on it
    throw err;
  }
  if (res.status === 204) return null;
  return res.json();
}
function askKey() {
  const k = prompt('Enter the Poké Math API key:');
  if (k) { localStorage.setItem('mg_api_key', k.trim()); onRoute(); }
}
function showError(e) { if (e.message === 'offline' || e.message === 'unauthorized') return; toast('Error: ' + e.message); }

// ---------- utils ----------
// localDayStr returns the device-local YYYY-MM-DD (not UTC) -- the screen-
// time dial's daily auto-reset rolls over on this date, so it must match
// the day the kid actually sees on the iPad, not the server's UTC day.
function localDayStr(d) {
  d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
const $ = s => document.querySelector(s);
function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function fmtInt(n) { return Number(n).toLocaleString('en-US'); }
function toast(msg, ms = 2600) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), ms);
}
function openDialog(html) { const d = $('#dlg'); d.innerHTML = html; if (!d.open) d.showModal(); }
function closeDialog() { const d = $('#dlg'); if (d.open) d.close(); }
function fmtLoose(v) {
  if (v == null) return '';
  if (typeof v === 'object') {
    if ('value' in v) return String(v.value);
    if ('values' in v) return v.values.join(', ');
    if ('num' in v && 'den' in v) return v.num + '/' + v.den;
    if ('index' in v) return 'choice ' + v.index;
    return JSON.stringify(v);
  }
  return String(v);
}

// ---------- sound (Web Audio synthesis only) ----------
const sfx = (() => {
  let ctx;
  function actx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, start, dur, type, peak) {
    if (S.muted) return;
    const c = actx(), osc = c.createOscillator(), gain = c.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, c.currentTime + start);
    gain.gain.setValueAtTime(0, c.currentTime + start);
    gain.gain.linearRampToValueAtTime(peak || .18, c.currentTime + start + .02);
    gain.gain.exponentialRampToValueAtTime(.001, c.currentTime + start + dur);
    osc.connect(gain); gain.connect(c.destination);
    osc.start(c.currentTime + start); osc.stop(c.currentTime + start + dur + .02);
  }
  function sweep(f0, f1, start, dur, type, peak) {
    if (S.muted) return;
    const c = actx(), osc = c.createOscillator(), gain = c.createGain();
    osc.type = type || 'sawtooth';
    osc.frequency.setValueAtTime(f0, c.currentTime + start);
    osc.frequency.exponentialRampToValueAtTime(f1, c.currentTime + start + dur);
    gain.gain.setValueAtTime(0, c.currentTime + start);
    gain.gain.linearRampToValueAtTime(peak || .14, c.currentTime + start + dur * .3);
    gain.gain.exponentialRampToValueAtTime(.001, c.currentTime + start + dur);
    osc.connect(gain); gain.connect(c.destination);
    osc.start(c.currentTime + start); osc.stop(c.currentTime + start + dur + .02);
  }
  return {
    unlockAudio() { actx(); },
    correct() { tone(523.25, 0, .14, 'sine', .2); tone(784, .09, .18, 'sine', .22); },
    wrong() { tone(140, 0, .25, 'sine', .16); tone(105, .12, .32, 'sine', .12); },
    streak() { sweep(300, 900, 0, .35, 'sawtooth', .1); },
    levelup() { [523, 659, 784, 1047].forEach((f, i) => tone(f, i * .09, .18, 'triangle', .2)); },
    unlockFanfare() { tone(392, 0, .12, 'square', .13); tone(523, .08, .12, 'square', .13); tone(659, .16, .32, 'square', .16); sweep(700, 1500, .05, .4, 'sine', .07); },
    legendaryMoment() { [261, 329, 392, 523, 659, 784, 1047].forEach((f, i) => tone(f, i * .07, .22, 'sawtooth', .18)); sweep(200, 2200, .1, .9, 'sawtooth', .09); },
    luckyEgg() { sweep(180, 1400, 0, .32, 'sawtooth', .24); tone(220, .28, .12, 'square', .22); tone(140, .38, .18, 'square', .22); },
    criticalHit() { sweep(600, 1800, 0, .5, 'sine', .1); sweep(900, 2200, .12, .5, 'sine', .08); tone(1760, .3, .4, 'sine', .07); },
    rareCandy() { tone(300, 0, .08, 'square', .18); tone(900, .06, .1, 'triangle', .16); tone(1400, .14, .12, 'sine', .14); tone(1800, .2, .14, 'sine', .12); },
    slowpoke() { sweep(90, 130, 0, .9, 'sawtooth', .12); tone(261, .85, .3, 'triangle', .16); tone(329, .9, .3, 'triangle', .14); tone(392, .95, .35, 'triangle', .16); },
  };
})();
document.addEventListener('pointerdown', function once() { sfx.unlockAudio(); document.removeEventListener('pointerdown', once); }, { once: true });
function toggleMute() { S.muted = !S.muted; localStorage.setItem('mg_mute', S.muted ? '1' : '0'); renderMuteBtn(); render(); }
function renderMuteBtn() { $('#muteBtn').textContent = S.muted ? '🔇' : '🔊'; }

// ---------- SVG helpers ----------
function hueFromSlug(slug) { let h = 0; for (const c of String(slug)) h = (h * 31 + c.charCodeAt(0)) >>> 0; return h % 360; }
// Body-shape category per slug -- a small parameterized set of silhouettes
// (bird / dragon / serpent / humanoid / blob / small) evocative of each
// Pokémon's general form. Anything not listed falls back to 'blob'. These
// are original geometric shapes, not traced/copied official artwork.
const POKEMON_SHAPE = {
  pidgey: 'bird', articuno: 'bird', zapdos: 'bird', moltres: 'bird',
  charizard: 'dragon', dragonite: 'dragon',
  gyarados: 'serpent', onix: 'serpent',
  machop: 'humanoid', alakazam: 'humanoid', mewtwo: 'humanoid', gengar: 'humanoid',
  snorlax: 'blob', caterpie: 'blob', blastoise: 'blob', venusaur: 'blob',
  mew: 'small', psyduck: 'small', growlithe: 'small', eevee: 'small', rattata: 'small', geodude: 'small',
};
// Palette override per slug (falls back to a hue derived from the slug for
// anything not listed) -- picked to evoke each Pokémon's signature color.
const POKEMON_COLOR = {
  pidgey: '#c8a165', rattata: '#8a7060', caterpie: '#7cb342', eevee: '#c9945a',
  growlithe: '#e8792a', machop: '#a8785a', geodude: '#8d7b68', charizard: '#f4813a',
  psyduck: '#f2d675', gyarados: '#3f77c9', gengar: '#6a4c93', snorlax: '#4a5568',
  blastoise: '#4fa3d1', venusaur: '#4f9e5a', dragonite: '#e8a53a', articuno: '#6fc3e8',
  zapdos: '#f2c230', moltres: '#e8532e', mewtwo: '#9b7fc9', mew: '#f2a8c9',
  onix: '#8d97a5', alakazam: '#f2c230', lapras: '#7fb8d9',
};
function pokemonSVG(f, size) {
  size = size || 80;
  const slug = f.slug || f.ref || f.name || 'x';
  const hue = hueFromSlug(slug);
  const body = POKEMON_COLOR[slug] || ('hsl(' + hue + ',60%,55%)');
  const accent = 'hsl(' + ((hue + 40) % 360) + ',55%,32%)';
  const aura = RARITY_COLOR[f.rarity] || RARITY_COLOR.common;
  const locked = !f.unlocked;
  const fill = locked ? '#333' : body;
  const shape = POKEMON_SHAPE[slug] || 'blob';
  let inner;
  if (shape === 'bird') {
    inner = '<path d="M50 30 L20 55 L36 58 L26 78 L46 66 L50 84 L54 66 L74 78 L64 58 L80 55 Z" fill="' + fill + '"/>' +
      '<circle cx="50" cy="40" r="12" fill="' + fill + '"/>';
  } else if (shape === 'dragon') {
    inner = '<path d="M50 82 Q30 70 26 46 Q18 50 14 40 Q26 38 32 46 Q36 30 50 24 Q64 30 68 46 Q74 38 86 40 Q82 50 74 46 Q70 70 50 82 Z" fill="' + fill + '"/>' +
      '<path d="M50 24 L54 8 L58 22 Z" fill="' + accent + '"/>';
  } else if (shape === 'serpent') {
    inner = '<path d="M18 70 Q30 40 46 55 Q62 70 74 42 Q82 28 88 34" stroke="' + fill + '" stroke-width="16" fill="none" stroke-linecap="round"/>' +
      '<circle cx="86" cy="32" r="9" fill="' + fill + '"/>';
  } else if (shape === 'humanoid') {
    inner = '<circle cx="50" cy="40" r="16" fill="' + fill + '"/>' +
      '<path d="M34 60 Q50 50 66 60 L70 90 L30 90 Z" fill="' + fill + '"/>';
  } else if (shape === 'small') {
    inner = '<circle cx="50" cy="56" r="24" fill="' + fill + '"/>' +
      '<circle cx="36" cy="34" r="8" fill="' + fill + '"/><circle cx="64" cy="34" r="8" fill="' + fill + '"/>';
  } else {
    inner = '<circle cx="50" cy="58" r="30" fill="' + fill + '"/><circle cx="50" cy="30" r="14" fill="' + fill + '"/>';
  }
  return '<svg viewBox="0 0 100 100" width="' + size + '" height="' + size + '" class="pokemon-svg">' +
    (!locked ? '<circle cx="50" cy="55" r="42" fill="' + aura + '" opacity=".22" class="aura-ring"/>' : '') +
    '<g opacity="' + (locked ? '.5' : '1') + '">' + inner + '</g>' +
    (locked ? '<text x="50" y="60" text-anchor="middle" font-size="26" fill="#6b7396" font-weight="800">?</text>' : '') +
    '</svg>';
}
function fractionBarSVG(parts, shaded) {
  parts = Math.max(1, parts | 0);
  const w = 260, h = 46, gap = 3, cell = (w - gap * parts) / parts;
  let rects = '';
  for (let i = 0; i < parts; i++) {
    rects += '<rect x="' + (i * (cell + gap)) + '" y="0" width="' + cell + '" height="' + h + '" rx="6" fill="' + (i < shaded ? 'var(--orange)' : 'var(--line)') + '"/>';
  }
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" class="fraction-bar">' + rects + '</svg>';
}
function sequenceHTML(seq) {
  return '<div class="seq-row">' + seq.map(v => '<div class="seq-box ' + (v === null ? 'blank' : '') + '">' + (v === null ? '?' : v) + '</div>').join('') + '</div>';
}
function gridDisplayHTML(grid) {
  try {
    if (grid && Array.isArray(grid.rows)) {
      return '<table class="logic-grid"><tbody>' + grid.rows.map(row =>
        '<tr>' + (Array.isArray(row) ? row : [row]).map(c => '<td>' + esc(c) + '</td>').join('') + '</tr>'
      ).join('') + '</tbody></table>';
    }
  } catch (e) {}
  return '<pre class="grid-raw">' + esc(JSON.stringify(grid, null, 1)) + '</pre>';
}

// ---------- routing ----------
function currentRoute() { const h = location.hash || '#/home'; return h.slice(2) || 'home'; }
function go(view) {
  if (location.hash !== '#/' + view) location.hash = '#/' + view;
  else onRoute();
}
window.addEventListener('hashchange', onRoute);
async function onRoute() {
  S.view = currentRoute();
  render();
  try {
    if (S.view === 'home') await loadHome();
    else if (S.view === 'collection') await loadCollection();
    else if (S.view === 'quests') await loadQuests();
    else if (S.view === 'parents') await loadParents();
    else if (S.view === 'qreview') await loadQuestionReview();
    else if (S.view === 'stlog') await loadScreenTimeLog();
    else if (S.view === 'inbox') await loadInbox();
    else if (S.view === 'clips') await loadClipsManage();
    render();
  } catch (e) { showError(e); }
}

async function loadHome() {

// ---------- screen-time energy gauge (Poké Ball meter, semicircle, 0-60 min) ----------
// Angle convention: 0deg points left (9 o'clock, 0 min), sweeping clockwise
// over the top (12 o'clock, 30 min) to right (3 o'clock, 60 min = cap).
function gaugeNeedlePoint(minutes, cap, len) {
  const angle = (Math.min(minutes, cap) / cap) * 180; // 0..180, clockwise from left
  const rad = (180 - angle) * Math.PI / 180; // convert to standard math angle for cos/sin
  return { x: 100 + len * Math.cos(rad), y: 100 - len * Math.sin(rad) };
}
function gaugeSVG(st) {
  const full = st.full;
  const pct = Math.min(100, (st.minutes_earned / st.minutes_cap) * 100);
  const ticks = [];
  for (let v = 0; v <= st.minutes_cap; v += 10) {
    const inner = gaugeNeedlePoint(v, st.minutes_cap, 72);
    const outer = gaugeNeedlePoint(v, st.minutes_cap, 82);
    ticks.push('<line class="gauge-tick" x1="' + inner.x.toFixed(1) + '" y1="' + inner.y.toFixed(1) + '" x2="' + outer.x.toFixed(1) + '" y2="' + outer.y.toFixed(1) + '"/>');
  }
  const label = full ? 'FULLY CHARGED! — 1 HOUR EARNED!' : 'SCREEN TIME';
  // The label is plain HTML, not SVG <text>, so the full-state copy can wrap
  // instead of overflowing a fixed-width viewBox (it did, badly, as SVG text).
  return '<div class="gauge-wrap ' + (full ? 'full' : '') + '" id="gaugeWrap">' +
    '<div class="gauge-title">⚡ SCREEN TIME EARNED ⚡</div>' +
    '<svg viewBox="0 0 200 104" class="gauge-svg">' +
    '<path class="gauge-track" d="M 20,100 A 80,80 0 0 1 180,100" fill="none" stroke-width="10" stroke-linecap="round" pathLength="100"/>' +
    '<path class="gauge-fill" d="M 20,100 A 80,80 0 0 1 180,100" fill="none" stroke-width="10" stroke-linecap="round" pathLength="100" stroke-dasharray="' + pct.toFixed(1) + ' 100"/>' +
    ticks.join('') +
    '<line id="gaugeNeedle" class="gauge-needle" x1="100" y1="100" x2="30" y2="100"/>' +
    '<circle cx="100" cy="100" r="5" fill="var(--text)"/>' +
    '<text x="100" y="86" text-anchor="middle" class="gauge-minutes">' + st.minutes_earned + ' min</text>' +
    '</svg>' +
    '<div class="gauge-label">' + esc(label) + '</div>' +
    '</div>';
}
let lastGaugeMinutesShown = null;
function animateGaugeNeedle(st) {
  const needle = document.getElementById('gaugeNeedle');
  if (!needle) return;
  const target = Math.min(st.minutes_earned, st.minutes_cap);
  const wasFull = S.screenTimeFullSeen;
  if (st.full && !wasFull) { S.screenTimeFullSeen = true; if (!reducedMotion()) setTimeout(() => sfx.unlockFanfare(), 300); }

  const start = (lastGaugeMinutesShown == null || reducedMotion()) ? target : lastGaugeMinutesShown;
  lastGaugeMinutesShown = target;
  function place(v) {
    const p = gaugeNeedlePoint(v, st.minutes_cap, 74);
    needle.setAttribute('x2', p.x.toFixed(1)); needle.setAttribute('y2', p.y.toFixed(1));
  }
  if (start === target || reducedMotion()) { place(target); return; }
  const dur = 700, t0 = performance.now();
  function step(t) {
    const p = Math.min(1, (t - t0) / dur);
    place(start + (target - start) * p);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
// Continuous last-30-day strip of correct/wrong bars, newest on the right.
function activityBarHTML(days) {
  const byDay = {};
  (days || []).forEach(d => { byDay[d.day] = d; });
  const cells = [];
  let maxTotal = 1;
  const axis = [];
  for (let i = 29; i >= 0; i--) {
    const dt = new Date(); dt.setDate(dt.getDate() - i);
    const key = dt.toISOString().slice(0, 10);
    const d = byDay[key] || { day: key, correct: 0, wrong: 0 };
    maxTotal = Math.max(maxTotal, d.correct + d.wrong);
    axis.push(d);
  }
  for (const d of axis) {
    const total = d.correct + d.wrong;
    const label = d.day.slice(5).replace('-', '/');
    const title = total ? d.day + ': ' + d.correct + ' right, ' + d.wrong + ' wrong' : d.day + ': no practice';
    const ch = Math.round((d.correct / maxTotal) * 100);
    const wh = Math.round((d.wrong / maxTotal) * 100);
    cells.push('<div class="act-col" title="' + title + '">' +
      '<div class="act-bars">' +
        (total ? '<div class="act-wrong" style="height:' + wh + '%"></div><div class="act-correct" style="height:' + ch + '%"></div>' : '<div class="act-empty"></div>') +
      '</div>' +
      '<div class="act-day">' + label + '</div></div>');
  }
  return '<h3>Practice Calendar</h3>' +
    '<div class="hint">Green = right, red = wrong, one column per day (last 30). Swipe to scroll back.</div>' +
    '<div class="activity-scroll"><div class="activity-bar">' + cells.join('') + '</div></div>';
}
function recentUnlocksHTML() {
  if (!S.collection) return '';
  const recent = S.collection.pokemon.filter(f => f.unlocked).sort((a, b) => (b.unlocked_at || '').localeCompare(a.unlocked_at || '')).slice(0, 6);
  if (!recent.length) return '';
  return '<h3>Recent Unlocks</h3><div class="unlock-strip">' + recent.map(f =>
    '<div class="unlock-mini">' + pokemonSVG(f, 56) + '<div class="um-name">' + esc(f.name) + '</div></div>'
  ).join('') + '</div>';
}
function animatePowerNum(target) {
  const el = $('#powerNum'); if (!el) return;
  const start = lastPowerShown == null ? target : lastPowerShown;
  lastPowerShown = target;
  if (start === target) { el.textContent = fmtInt(target); return; }
  const dur = 800, t0 = performance.now();
  function step(t) {
    const p = Math.min(1, (t - t0) / dur);
    el.textContent = fmtInt(Math.round(start + (target - start) * p));
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function resetNumpad() { S.numpad = ''; S.numpadVals = ['', '']; S.numpadField = 0; S.mcSelected = -1; S.textVal = ''; }
async function loadNextQuestion() {
  const sess = S.session;
  if (!sess || sess.ended) return;
  let skill = sess.mode === 'quest' ? sess.skillCycle[sess.skillCycleIdx % sess.skillCycle.length] : sess.skill;
  if (sess.mode === 'quest') sess.skillCycleIdx++;

// ---------- PLAY: input handlers ----------
function padDigit(d) {
  if (S.locked || !S.current) return;
  const kind = S.current.payload.kind;
  if (kind === 'numeric') { if (S.numpad.length < 7) S.numpad += d; }
  else { const i = S.numpadField; if (S.numpadVals[i].length < 5) S.numpadVals[i] += d; }
  render();
}
function padBack() {
  if (S.locked || !S.current) return;
  const kind = S.current.payload.kind;
  if (kind === 'numeric') S.numpad = S.numpad.slice(0, -1);
  else { const i = S.numpadField; S.numpadVals[i] = S.numpadVals[i].slice(0, -1); }
  render();
}
function setField(i) { S.numpadField = i; render(); }
function selectMC(i) { if (S.locked) return; S.mcSelected = i; submitAnswer(); }
async function submitAnswer() {
  if (S.locked || !S.current) return;
  const q = S.current, kind = q.payload.kind;
  let given;
  if (kind === 'numeric') { if (S.numpad === '') return; given = { value: parseInt(S.numpad, 10) }; }
  else if (kind === 'numeric2') { if (!S.numpadVals[0] || !S.numpadVals[1]) return; given = { values: [parseInt(S.numpadVals[0], 10), parseInt(S.numpadVals[1], 10)] }; }
  else if (kind === 'fraction') { if (!S.numpadVals[0] || !S.numpadVals[1]) return; given = { num: parseInt(S.numpadVals[0], 10), den: parseInt(S.numpadVals[1], 10) }; }
  else if (kind === 'mc') { if (S.mcSelected < 0) return; given = { index: S.mcSelected }; }
  else if (kind === 'text') { if (!S.textVal.trim()) return; given = { value: S.textVal.trim() }; }
  else return;
  S.locked = true;
  const elapsed = Date.now() - S.currentStart;
  try {
    const result = await api('/attempts', { method: 'POST', body: { session_id: S.session.id, question_id: q.id, given, elapsed_ms: elapsed, day: localDayStr() } });
    afterAttempt(result, elapsed);
  } catch (e) { S.locked = false; showError(e); render(); }
}
function formatAnswer(kind, ans) {
  if (kind === 'numeric') return ans.value;
  if (kind === 'numeric2') return ans.values.join(' , ');
  if (kind === 'fraction') return ans.num + '/' + ans.den;
  if (kind === 'mc') return S.current.payload.choices[ans.index];
  if (kind === 'text') return ans.value;
  return JSON.stringify(ans);
}

// ---------- PLAY: attempt result / feedback / overlays ----------
function playFeedbackSfx(result) {
  if (result.correct) { sfx.correct(); if (result.streak === 3 || result.streak === 6 || result.streak === 11) setTimeout(() => sfx.streak(), 150); }
  else sfx.wrong();
}
function afterAttempt(result, elapsedMs) {
  stopKiTimer();
  const sess = S.session;
  sess.xpEarned += result.xp_earned;
  sess.total++;
  if (result.correct) sess.correct++;
  sess.curStreak = result.streak;
  sess.streakBest = Math.max(sess.streakBest, result.streak);

  // Capture the speed zone he landed in, from the same thresholds the server
  // scored with, so correct feedback can celebrate a speed bonus honestly.
  const zone = S.current ? kiZone(elapsedMs, S.current.difficulty) : 'base';
  // Screen-time tick: chip only when the dial actually moved and isn't
  // already pinned at the cap (that moment gets the Home gauge's own
  // full-state celebration instead).
  const prevMinutes = sess.screenTimeMinutes || 0;
  const sttDelta = result.screen_time_minutes > prevMinutes && result.screen_time_minutes < 60 ? result.screen_time_minutes - prevMinutes : 0;
  sess.screenTimeMinutes = Math.max(prevMinutes, result.screen_time_minutes || 0);
  S.feedback = Object.assign({}, result, { dismissable: result.correct, speedZone: zone, sttDelta });
  render();
  playFeedbackSfx(result);

  if (!result.correct) setTimeout(() => { if (S.feedback) { S.feedback.dismissable = true; render(); } }, 2000);
  else setTimeout(() => continueAfterFeedback(), 1100);
}
async function continueAfterFeedback() {
  if (!S.feedback) return;
  const result = S.feedback, skill = S.current.skill;
  S.feedback = null;
  const overlays = [];
  if (result.event) overlays.push({ type: 'event', event: result.event, xpEarned: result.xp_earned });
  if (result.level_changed > 0) overlays.push({ type: 'levelup', skill, level: result.skill_level });
  if (!S.seenLegendaryMoment && result.xp_before < 9000 && result.xp >= 9000) {
    overlays.push({ type: 'legendary' }); localStorage.setItem('mg_seen_legendary', '1'); S.seenLegendaryMoment = true;
  }
  (result.unlocks || []).forEach(u => overlays.push({ type: 'unlock', unlock: u }));

  if (S.session.mode === 'quest') {
    try {
      const updated = await api('/quests/' + S.session.chapter.id);
      const justCompleted = !S.session.chapter.completed_at && updated.completed_at;
      S.session.chapter = updated;
      if (justCompleted) overlays.push({ type: 'questcomplete', chapter: updated });
    } catch (e) {}
  }
  // Clip is always the finale: pushed last so the XP moment (event/levelup/
  // unlock) plays first on a correct answer, and it's the sole overlay on a
  // wrong one (gentle encouragement).
  if (result.clip) overlays.push({ type: 'clip', clip: result.clip, playing: false });
  S.overlayQueue = overlays;
  S.locked = false;
  advanceOverlay();
}
let eventDismissTimer = null;
function advanceOverlay() {
  if (eventDismissTimer) { clearTimeout(eventDismissTimer); eventDismissTimer = null; }
  if (S.overlayQueue && S.overlayQueue.length) {
    S.currentOverlay = S.overlayQueue.shift();
    const t = S.currentOverlay.type;
    if (t === 'levelup') sfx.levelup();
    else if (t === 'unlock') sfx.unlockFanfare();
    else if (t === 'legendary') sfx.legendaryMoment();
    else if (t === 'event') {
      const eventSfx = { critical_hit: 'criticalHit', rare_candy: 'rareCandy', slowpoke: 'slowpoke' }[S.currentOverlay.event.slug] || 'luckyEgg';
      sfx[eventSfx]();
      eventDismissTimer = setTimeout(advanceOverlay, 2500);
    }
    render();
  } else {
    S.currentOverlay = null;
    render();
    loadNextQuestion();
  }
}

// ---------- PLAY: ki-charge speed timer ----------
// Mirrors internal/game/score.go: fast_ms = 5000 + 2000*difficulty (x1.5 XP),
// ok_ms = 3*fast_ms (x1.2 XP), slower = base. The bar drains over ok_ms; the
// zone he's in is the speed bonus he's currently earning. Running out is not a
// failure — it just means base XP, so there's no buzzer and no red "time up".
function fastMs(d) { return 5000 + 2000 * d; }
function okMs(d) { return 3 * fastMs(d); }
const KI_ZONES = {
  blazing: { taunt: 'BLAZING! 🔥 x1.5 power!', snap: 100 },
  fast:    { taunt: 'A rival trainer is catching up… x1.2', snap: 62 },
  base:    { taunt: 'Powering down — focus!', snap: 22 },
};
function kiZone(elapsed, d) {
  if (elapsed <= fastMs(d)) return 'blazing';
  if (elapsed <= okMs(d)) return 'fast';
  return 'base';
}
function kiBarHTML(d) {
  const zone = kiZone(Date.now() - S.currentStart, d);
  const pct = Math.max(0, 1 - (Date.now() - S.currentStart) / okMs(d)) * 100;
  return '<div class="ki-wrap"><div class="ki-track"><div id="kiBar" class="ki-fill ' + zone + '" style="width:' + pct.toFixed(1) + '%"></div></div>' +
    '<div id="kiTaunt" class="ki-taunt ' + zone + '">' + KI_ZONES[zone].taunt + '</div></div>';
}
let kiHandle = null, kiIsInterval = false;
function stopKiTimer() {
  if (kiHandle == null) return;
  if (kiIsInterval) clearInterval(kiHandle); else cancelAnimationFrame(kiHandle);
  kiHandle = null;
}
function reducedMotion() { return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }
function applyKi(snap) {
  const bar = document.getElementById('kiBar');
  if (!bar || !S.current) return;
  const d = S.current.difficulty, elapsed = Date.now() - S.currentStart;
  const zone = kiZone(elapsed, d);
  bar.style.width = (snap ? KI_ZONES[zone].snap : Math.max(0, 1 - elapsed / okMs(d)) * 100).toFixed(1) + '%';
  bar.className = 'ki-fill ' + zone;
  const taunt = document.getElementById('kiTaunt');
  if (taunt) { taunt.textContent = KI_ZONES[zone].taunt; taunt.className = 'ki-taunt ' + zone; }
}
function startKiTimer() {
  stopKiTimer();
  if (!S.showTimer) return;
  const alive = () => S.session && !S.feedback && S.view === 'play' && S.current && document.getElementById('kiBar');
  if (reducedMotion()) {
    // Snap between zones instead of a continuous smooth drain.
    kiIsInterval = true;
    applyKi(true);
    kiHandle = setInterval(() => { if (!alive()) return stopKiTimer(); applyKi(true); }, 500);
  } else {
    kiIsInterval = false;
    const frame = () => { if (!alive()) return stopKiTimer(); applyKi(false); kiHandle = requestAnimationFrame(frame); };
    kiHandle = requestAnimationFrame(frame);
  }
}

function dayChartSVG(perDay) {
  if (!perDay.length) return '<div class="empty">No activity yet</div>';
  const w = 700, h = 160, pad = 20;
  const max = Math.max(1, ...perDay.map(d => d.attempts));
  const bw = (w - pad * 2) / perDay.length;
  const bars = perDay.map((d, i) => {
    const bh = (d.attempts / max) * (h - pad * 2);
    const x = pad + i * bw, y = h - pad - bh;
    const color = d.correct_bp >= 8500 ? 'var(--green)' : d.correct_bp >= 6500 ? 'var(--gold)' : 'var(--red)';
    return '<rect x="' + (x + 1) + '" y="' + y + '" width="' + Math.max(1, bw - 2) + '" height="' + bh + '" fill="' + color + '"><title>' + d.day + ': ' + d.attempts + ' attempts, ' + (d.correct_bp / 100).toFixed(1) + '%</title></rect>';
  }).join('');
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" class="day-chart">' + bars + '<line x1="' + pad + '" y1="' + (h - pad) + '" x2="' + (w - pad) + '" y2="' + (h - pad) + '" stroke="var(--line)"/></svg>';
}

  const minutes_per_correct = parseInt($('#setMinutesPerCorrect').value, 10) || 1;
  const daily_count = (S.settingsData && S.settingsData.daily_count) || 5;
  const level_override = (S.settingsData && S.settingsData.level_override) || {};
  const clip_chance = (S.settingsData && S.settingsData.clip_chance) || 40;
  const clip_session_cap = (S.settingsData && S.settingsData.clip_session_cap) != null ? S.settingsData.clip_session_cap : 2;
  try {
    S.settingsData = await api('/settings', { method: 'PUT', body: { daily_count, level_override, minutes_per_correct, clip_chance, clip_session_cap } });
    S.screenTime = await api('/screentime?day=' + localDayStr());
    toast('Screen time rate saved');
    render();
  } catch (e) { showError(e); }
}
function confirmResetScreenTime() {
  const st = S.screenTime;
  if (!st || st.minutes_earned === 0) return;
  openDialog('<h2>Reset the dial?</h2><p class="muted">' + st.minutes_earned + ' min will be marked redeemed.</p>' +
    '<div class="dlg-actions"><button class="btn ghost" onclick="closeDialog()">Cancel</button>' +
    '<button class="btn primary" onclick="closeDialog(); runResetScreenTime()">Reset</button></div>');
}
async function runResetScreenTime() {
  try {
    await api('/screentime/reset', { method: 'POST', body: { day: localDayStr() } });
    S.screenTime = await api('/screentime?day=' + localDayStr());
    S.screenTimeFullSeen = false;
    toast('Screen time dial reset');
    render();
  } catch (e) { showError(e); }
}
function renderScreenTimeLog(m) {
  const log = S.screenTimeLog, st = S.screenTime;
  if (!log || !st) { m.innerHTML = '<div class="empty">Loading…</div>'; return; }
  const currentRow = '<tr class="st-current-row"><td>Current</td><td>Current</td><td>' + st.minutes_earned + ' min</td><td>' + st.corrects_since_reset + '</td></tr>';
  // Skip the one-time bootstrap marker (a daily row with nothing redeemed,
  // written the first time this feature ever ran) -- it's bookkeeping, not
  // a real reset a parent would want to see.
  const visible = log.filter(r => !(r.reason === 'daily' && r.minutes_redeemed === 0 && r.corrects_counted === 0));
  const rows = visible.map(r => '<tr><td>' + new Date(r.reset_at).toLocaleString() + '</td><td>' + (r.reason === 'daily' ? 'Daily reset' : 'Redeemed by parent') + '</td><td>' + r.minutes_redeemed + ' min</td><td>' + r.corrects_counted + '</td></tr>').join('');
  m.innerHTML = '<div class="parents-wrap">' +
    '<button class="btn ghost sm" onclick="go(\'parents\')">← Back</button>' +
    '<h2>Screen Time Log</h2>' +
    '<div class="hint">The in-progress period is highlighted at the top. "Daily reset" rows rolled over automatically at the start of a new day (nothing redeemed); "Redeemed by parent" rows are manual resets.</div>' +
    '<div class="scrollx"><table class="ptab"><thead><tr><th>Reset At</th><th>Reason</th><th>Minutes</th><th>Corrects</th></tr></thead><tbody>' +
    currentRow + (rows || '<tr><td colspan="4" class="muted">No resets yet</td></tr>') +
    '</tbody></table></div></div>';
}
function bankHTML(bank) {
  const bySkill = {};
  for (const b of bank) (bySkill[b.skill] = bySkill[b.skill] || []).push(b);
  return Object.keys(bySkill).map(skill => {
    const rows = bySkill[skill].slice().sort((a, b) => a.level - b.level);
    return '<div class="bank-skill"><div class="bank-skill-name">' + (SKILL_NAME[skill] || skill) + '</div>' +
      '<div class="bank-levels">' + rows.map(r => '<div class="bank-lvl ' + (r.available < 10 ? 'low' : '') + '" title="Level ' + r.level + ': ' + r.available + ' questions">L' + r.level + '<br>' + r.available + '</div>').join('') + '</div>' +
      (S.aiEnabled ? '<button class="btn sm" onclick="openGenerateDialog(\'' + skill + '\')" title="Ask Claude to write a new batch of questions for this skill and add the good ones to the bank">Generate</button>' : '<button class="btn sm" disabled title="AI content generation is off">Generate</button>') + '</div>';
  }).join('');
}
function openGenerateDialog(skill) {
  openDialog('<h2>Generate Content</h2><label class="f">Skill</label><div>' + (SKILL_NAME[skill] || skill) + '</div>' +
    '<label class="f">Difficulty (1-10)</label><input id="genLevel" type="number" min="1" max="10" value="5"/>' +
    '<label class="f">Count</label><input id="genCount" type="number" min="1" max="40" value="10"/>' +
    '<div class="dlg-actions"><button class="btn ghost" onclick="closeDialog()">Cancel</button><button class="btn primary" onclick="runGenerate(\'' + skill + '\')">Generate</button></div>');
}
async function runGenerate(skill) {
  const level = parseInt($('#genLevel').value, 10), count = parseInt($('#genCount').value, 10);
  closeDialog();
  toast('Generating…');
  try {
    const result = await api('/generate', { method: 'POST', body: { kind: skill, skill, difficulty: level, count } });
    toast('Generated: ' + result.accepted + ' accepted, ' + result.rejected + ' rejected');
    await loadParents(); render();
  } catch (e) { showError(e); }
}
function qreviewSummaryText(qs) {
  qs = qs || [];
  if (!qs.length) return 'No AI questions yet.';
  const retired = qs.filter(q => q.retired).length;
  return qs.length + ' AI question' + (qs.length === 1 ? '' : 's') + ' in the bank' + (retired ? ' · ' + retired + ' retired' : '') + '.';
}
async function loadQuestionReview() {
  S.questions = await api('/questions?source=ai') || [];
}
function renderQuestionReview(m) {
  m.innerHTML = '<div class="parents-wrap">' +
    '<button class="btn ghost sm" onclick="go(\'parents\')">← Back</button>' +
    '<h2>Question Review</h2>' +
    '<div class="hint">Every AI-written word problem and logic puzzle currently in the bank. If one is confusing, wrong, or just not good, retire it — retired questions are never served to Skyler again but stay listed here in case you want to bring one back later.</div>' +
    questionsReviewHTML(S.questions) +
    '</div>';
}
function questionsReviewHTML(qs) {
  if (!qs || !qs.length) return '<div class="empty">No AI questions yet</div>';
  const sorted = qs.slice().sort((a, b) =>
    (a.skill < b.skill ? -1 : a.skill > b.skill ? 1 : 0) || (a.difficulty - b.difficulty) || (a.id - b.id));
  return '<div class="qreview-list">' + sorted.map(q =>
    '<div class="qreview-row ' + (q.retired ? 'retired' : '') + '"><div class="qr-main"><b>' + (SKILL_NAME[q.skill] || q.skill) + '</b> L' + q.difficulty + ' — ' + esc(q.payload.prompt) + '</div>' +
    '<button class="btn sm" onclick="toggleRetire(' + q.id + ', ' + (!q.retired) + ')">' + (q.retired ? 'Unretire' : 'Retire') + '</button></div>'
  ).join('') + '</div>';
}
async function toggleRetire(id, retired) {
  try {
    await api('/questions/' + id + '/' + (retired ? 'retire' : 'unretire'), { method: 'POST' });
    S.questions = await api('/questions?source=ai') || [];
    render();
  } catch (e) { showError(e); }
}
function settingsFormHTML(st) {
  return '<div class="settings-form"><label class="f">Level overrides (blank = adaptive)</label>' +
    '<div class="hint"><b>Adaptive</b> means the app quietly raises or lowers each skill\'s difficulty (1–10) on its own, based on his last 10 answers in that skill — a strong run levels him up, a rough one levels him down, with no one having to touch anything. Type a number here to pin a skill to that fixed level instead, overriding the automatic adjustment; clear it back to blank to let the app resume adapting from wherever his real progress is.</div>' +
    SKILLS.map(sk => '<div class="override-row"><span>' + sk.name + '</span><input type="number" min="1" max="10" id="ov_' + sk.slug + '" value="' + (st.level_override[sk.slug] || '') + '" placeholder="auto"/></div>').join('') +
    '<label class="f" style="display:flex;align-items:center;gap:8px"><input type="checkbox" style="width:auto" id="setMuteDefault" ' + (S.muted ? 'checked' : '') + ' onchange="toggleMute()"/> Mute sound</label>' +
    '<label class="f" style="display:flex;align-items:center;gap:8px"><input type="checkbox" style="width:auto" id="setTimer" ' + (S.showTimer ? 'checked' : '') + ' onchange="toggleTimer()"/> Show speed timer during play</label>' +
    '<button class="btn primary" onclick="saveSettings()">Save Settings</button></div>';
}
function toggleTimer() {
  S.showTimer = !S.showTimer;
  localStorage.setItem('mg_timer', S.showTimer ? '1' : '0');
}
function confirmReset() {
  openDialog('<h2>Reset everything?</h2>' +
    '<div class="dc-sub" style="margin-bottom:14px">This wipes all of Skyler’s progress and <b>cannot be undone</b>. Type <b>RESET</b> below to confirm.</div>' +
    '<input id="resetConfirm" type="text" placeholder="RESET" autocapitalize="characters" autocomplete="off"/>' +
    '<div class="dlg-actions"><button class="btn ghost" onclick="closeDialog()">Cancel</button>' +
    '<button class="btn danger" onclick="runReset()">Reset All Progress</button></div>');
}
async function runReset() {
  const val = ($('#resetConfirm').value || '').trim().toUpperCase();
  if (val !== 'RESET') { toast('Type RESET to confirm'); return; }
  closeDialog();
  try {
    await api('/reset', { method: 'POST', body: { confirm: 'RESET' } });
    lastPowerShown = null;
    toast('Progress reset to zero ⚡');
    await loadParents(); render();
  } catch (e) { showError(e); }
}
async function saveSettings() {
  // daily_count and minutes_per_correct are retained server-side (daily mode
  // is retired in the UI; the screen-time rate has its own Save Rate button
  // up in the Screen Time section) — preserve their current values so the
  // settings PUT stays valid.
  const daily_count = (S.settingsData && S.settingsData.daily_count) || 5;
  const minutes_per_correct = (S.settingsData && S.settingsData.minutes_per_correct) || 3;
  const clip_chance = (S.settingsData && S.settingsData.clip_chance) || 40;
  const clip_session_cap = (S.settingsData && S.settingsData.clip_session_cap) != null ? S.settingsData.clip_session_cap : 2;
  const level_override = {};
  for (const sk of SKILLS) { const v = $('#ov_' + sk.slug).value; if (v) level_override[sk.slug] = parseInt(v, 10); }
  try {
    S.settingsData = await api('/settings', { method: 'PUT', body: { daily_count, level_override, minutes_per_correct, clip_chance, clip_session_cap } });
    toast('Settings saved');
    render();
  } catch (e) { showError(e); }
}
async function downloadExport() {
  try {
    const res = await fetch('/api/export', { headers: { Authorization: 'Bearer ' + apiKey() } });
    if (!res.ok) { toast('Export failed'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const cd = res.headers.get('Content-Disposition') || '';
    const match = cd.match(/filename=([^;]+)/);
    a.download = match ? match[1] : 'mathgames-export.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  } catch (e) { showError(e); }
}

// ---------- CLIPS MANAGE (#/clips, hidden — mirrors #/parents) ----------
async function loadClipsManage() {
  const [clips, plays, health, settings] = await Promise.all([
    api('/clips'), api('/clips/plays?limit=50'),
    fetch('/api/health').then(r => r.json()).catch(() => ({ video: false })),
    api('/settings'),
  ]);
  S.clips = clips || []; S.clipPlays = plays || []; S.videoEnabled = !!health.video; S.settingsData = settings;
}
function renderClipsManage(m) {
  if (!S.clips || !S.settingsData) { m.innerHTML = '<div class="empty">Loading…</div>'; return; }
  m.innerHTML = '<div class="parents-wrap">' +
    '<button class="btn ghost sm" onclick="go(\'parents\')">← Back</button>' +
    '<h2>🎬 Video Clips</h2>' +
    '<div class="hint">Personal video clips from Jim/family that Skyler unlocks on a rare random roll right after answering — correct or wrong. Not shown anywhere else in the app.</div>' +
    '<h3>Upload</h3>' + clipUploadFormHTML() +
    '<h3>Clips</h3>' + clipListHTML(S.clips) +
    '<h3>Settings</h3>' + clipSettingsFormHTML(S.settingsData) +
    '<h3>Recent Plays</h3>' + clipPlaysLogHTML(S.clipPlays) +
    '</div>';
}
function clipUploadFormHTML() {
  if (!S.videoEnabled) return '<div class="ai-off-notice">⚠️ Video storage isn\'t configured (set the R2_* env vars on Render).</div>';
  return '<div class="clip-upload-form">' +
    '<input type="file" id="clipFile" accept="video/*" onchange="onClipFileChosen()"/>' +
    '<video id="clipPreview" style="display:none" controls playsinline></video>' +
    '<label class="f">Title</label><input type="text" id="clipTitle" placeholder="e.g. Great job on your times tables!"/>' +
    '<label class="f chk"><input type="checkbox" id="clipOnCorrect" checked/> Play on correct answers</label>' +
    '<label class="f chk"><input type="checkbox" id="clipOnWrong"/> Play on wrong answers</label>' +
    '<label class="f">Weight (relative pick chance among eligible clips)</label><input type="number" id="clipWeight" min="1" value="1"/>' +
    '<label class="f chk"><input type="checkbox" id="clipEnabled" checked/> Enabled</label>' +
    '<button class="btn primary" onclick="uploadClip()" style="margin-top:12px">Upload Clip</button>' +
    '<div id="clipUploadProgress" class="hint" style="display:none;margin-top:8px"></div>' +
    '</div>';
}
let clipDurationMs = null;
function onClipFileChosen() {
  const input = $('#clipFile'), file = input.files[0], preview = $('#clipPreview');
  clipDurationMs = null;
  if (!file) { preview.style.display = 'none'; preview.removeAttribute('src'); return; }
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  preview.onloadedmetadata = () => { clipDurationMs = Math.round(preview.duration * 1000); };
}
function uploadClip() {
  const input = $('#clipFile'), file = input.files[0];
  const title = ($('#clipTitle').value || '').trim();
  if (!file) { toast('Choose a video file first'); return; }
  if (!title) { toast('Title is required'); return; }
  const fd = new FormData();
  fd.append('file', file);
  fd.append('title', title);
  fd.append('on_correct', $('#clipOnCorrect').checked ? 'true' : 'false');
  fd.append('on_wrong', $('#clipOnWrong').checked ? 'true' : 'false');
  fd.append('weight', $('#clipWeight').value || '1');
  fd.append('enabled', $('#clipEnabled').checked ? 'true' : 'false');
  if (clipDurationMs != null) fd.append('duration_ms', String(clipDurationMs));

  const bar = $('#clipUploadProgress');
  bar.style.display = 'block'; bar.textContent = 'Uploading… 0%';

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/clips');
  xhr.setRequestHeader('Authorization', 'Bearer ' + apiKey());
  xhr.upload.onprogress = (e) => { if (e.lengthComputable) bar.textContent = 'Uploading… ' + Math.round((e.loaded / e.total) * 100) + '%'; };
  xhr.onload = async () => {
    if (xhr.status >= 200 && xhr.status < 300) {
      toast('Clip uploaded');
      input.value = ''; $('#clipTitle').value = ''; $('#clipPreview').style.display = 'none';
      clipDurationMs = null;
      await loadClipsManage(); render();
    } else {
      let msg = 'Upload failed';
      try { msg = JSON.parse(xhr.responseText).error || msg; } catch (e) {}
      toast(msg);
      bar.style.display = 'none';
    }
  };
  xhr.onerror = () => { toast('Upload failed'); bar.style.display = 'none'; };
  xhr.send(fd);
}
function fmtBytes(n) {
  if (!n) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB'];
  let i = 0, v = n;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return v.toFixed(v < 10 && i > 0 ? 1 : 0) + ' ' + units[i];
}
function clipListHTML(clips) {
  if (!clips.length) return '<div class="empty">No clips yet</div>';
  return '<div class="clip-list">' + clips.map(c =>
    '<div class="clip-row"><div class="clip-row-main"><b>' + esc(c.title) + '</b>' +
    '<div class="clip-row-meta">' + (c.duration_ms ? Math.round(c.duration_ms / 1000) + 's · ' : '') + fmtBytes(c.size_bytes) + ' · ' + c.play_count + ' play' + (c.play_count === 1 ? '' : 's') + '</div></div>' +
    '<div class="clip-row-controls">' +
    '<label><input type="checkbox" ' + (c.enabled ? 'checked' : '') + ' onchange="updateClipField(' + c.id + ',\'enabled\',this.checked)"/> On</label>' +
    '<label><input type="checkbox" ' + (c.on_correct ? 'checked' : '') + ' onchange="updateClipField(' + c.id + ',\'on_correct\',this.checked)"/> ✓</label>' +
    '<label><input type="checkbox" ' + (c.on_wrong ? 'checked' : '') + ' onchange="updateClipField(' + c.id + ',\'on_wrong\',this.checked)"/> ✗</label>' +
    '<input type="number" min="1" value="' + c.weight + '" onchange="updateClipField(' + c.id + ',\'weight\',parseInt(this.value,10)||1)"/>' +
    '<button class="btn sm" onclick="previewClip(\'' + esc(c.url) + '\')">▶</button>' +
    '<button class="btn sm danger" onclick="confirmDeleteClip(' + c.id + ',\'' + esc(c.title).replace(/'/g, "\\'") + '\')">✕</button>' +
    '</div></div>'
  ).join('') + '</div>';
}
async function updateClipField(id, field, value) {
  const c = S.clips.find(x => x.id === id);
  if (!c) return;
  const body = { title: c.title, enabled: c.enabled, on_correct: c.on_correct, on_wrong: c.on_wrong, weight: c.weight };
  body[field] = value;
  try {
    const updated = await api('/clips/' + id, { method: 'PUT', body });
    Object.assign(c, updated);
    render();
  } catch (e) { showError(e); render(); }
}
function previewClip(url) {
  openDialog('<h2>Preview</h2><video src="' + esc(url) + '" controls playsinline style="width:100%;border-radius:10px"></video><div class="dlg-actions"><button class="btn ghost" onclick="closeDialog()">Close</button></div>');
}
function confirmDeleteClip(id, title) {
  openDialog('<h2>Delete clip?</h2><p class="muted">"' + esc(title) + '" will be removed permanently, including its video file.</p>' +
    '<div class="dlg-actions"><button class="btn ghost" onclick="closeDialog()">Cancel</button><button class="btn danger" onclick="closeDialog(); runDeleteClip(' + id + ')">Delete</button></div>');
}
async function runDeleteClip(id) {
  try { await api('/clips/' + id, { method: 'DELETE' }); await loadClipsManage(); toast('Clip deleted'); render(); }
  catch (e) { showError(e); }
}
function clipSettingsFormHTML(st) {
  return '<div class="settings-form">' +
    '<label class="f">Clip chance (1 in N answers)</label>' +
    '<input type="number" min="1" id="setClipChance" value="' + st.clip_chance + '"/>' +
    '<label class="f">Max clips per session</label>' +
    '<input type="number" min="0" id="setClipSessionCap" value="' + st.clip_session_cap + '"/>' +
    '<button class="btn primary" onclick="saveClipSettings()" style="margin-top:12px">Save Clip Settings</button></div>';
}
async function saveClipSettings() {
  const clip_chance = parseInt($('#setClipChance').value, 10) || 40;
  const capVal = parseInt($('#setClipSessionCap').value, 10);
  const clip_session_cap = isNaN(capVal) ? 2 : capVal;
  const daily_count = (S.settingsData && S.settingsData.daily_count) || 5;
  const minutes_per_correct = (S.settingsData && S.settingsData.minutes_per_correct) || 3;
  const level_override = (S.settingsData && S.settingsData.level_override) || {};
  try {
    S.settingsData = await api('/settings', { method: 'PUT', body: { daily_count, level_override, minutes_per_correct, clip_chance, clip_session_cap } });
    toast('Clip settings saved');
    render();
  } catch (e) { showError(e); }
}
function clipPlaysLogHTML(plays) {
  if (!plays || !plays.length) return '<div class="empty">No clips played yet</div>';
  return '<div class="scrollx"><table class="ptab"><thead><tr><th>Clip</th><th>Trigger</th><th>Played At</th></tr></thead><tbody>' +
    plays.map(p => '<tr><td>' + esc(p.clip_title) + '</td><td>' + (p.trigger === 'correct' ? '✓ correct' : '✗ wrong') + '</td><td>' + new Date(p.played_at).toLocaleString() + '</td></tr>').join('') +
    '</tbody></table></div>';
}

// ---------- boot ----------
async function init() {
  renderMuteBtn();
  if (!apiKey()) askKey();
  await onRoute();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
